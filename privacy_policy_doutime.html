const langMap = {
    'zh': 'zh', 'zh-CN': 'zh', 'zh-Hans': 'zh',
    'en': 'en', 'en-US': 'en', 'en-GB': 'en',
    'ja': 'ja',
    'ko': 'ko',

    'de': 'de', 'de-DE': 'de',
    'fr': 'fr', 'fr-FR': 'fr',
    'ar': 'ar', 'ar-SA': 'ar',
    'pt': 'pt-BR', 'pt-BR': 'pt-BR', 'pt-PT': 'pt-BR',
    'tr': 'tr',
    'vi': 'vi'
};

function getSystemLang() {
    const params = new URLSearchParams(window.location.search);
    const urlLang = params.get('lang');
    if (urlLang && langMap[urlLang]) {
        return langMap[urlLang];
    }
    if (urlLang && langMap[urlLang.toLowerCase()]) {
        return langMap[urlLang.toLowerCase()];
    }
    const browserLang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
    return langMap[browserLang] || langMap[browserLang.split('-')[0]] || 'en';
}
